<?xml version="1.0" encoding="UTF-8"?>
<!-- Arrowzen cover template (1600x900, 16:9). Open in a browser and export/
     screenshot to PNG for the CrazyGames cover. Colors match the in-game theme. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#efe3c6"/>
      <stop offset="100%" stop-color="#e2d2b0"/>
    </radialGradient>
    <style>
      .arrow { fill:none; stroke:#3f3220; stroke-width:10; stroke-linecap:round; stroke-linejoin:round; }
      .arrow.dim { stroke:#3f3220; opacity:0.18; }
      .accent { stroke:#3f7fcf; }
      .title { font-family:-apple-system,'Segoe UI',Inter,Arial,sans-serif; font-weight:800; fill:#3f3220; }
      .sub   { font-family:-apple-system,'Segoe UI',Inter,Arial,sans-serif; font-weight:600; fill:#8a7656; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Decorative winding arrows (background, dim) -->
  <g class="arrow dim">
    <path d="M180 230 h120 v90 h90"/><path d="M390 320 l30 0 m-30 -16 l34 16 l-34 16"/>
    <path d="M250 560 v-110 h130"/><path d="M380 450 l30 0 m-30 -16 l34 16 l-34 16"/>
    <path d="M210 700 h150 v-80"/><path d="M360 620 l0 -30 m-16 34 l16 -34 l16 34"/>
    <path d="M1300 250 h-120 v100 h-90"/><path d="M1090 350 l-30 0 m30 -16 l-34 16 l34 16"/>
    <path d="M1360 560 v-120 h-140"/><path d="M1220 440 l-30 0 m30 -16 l-34 16 l34 16"/>
    <path d="M1320 690 h-150 v-90"/><path d="M1170 600 l0 -30 m-16 34 l16 -34 l16 34"/>
  </g>

  <!-- Featured arrow (accent) -->
  <g class="arrow accent" stroke-width="14">
    <path d="M740 640 h120 v-90 h120"/>
    <path d="M980 550 l34 0 m-34 -18 l40 18 l-40 18"/>
  </g>

  <!-- Title -->
  <text class="title" x="800" y="420" text-anchor="middle" font-size="170" letter-spacing="-3">Arrowzen</text>
  <text class="sub" x="800" y="500" text-anchor="middle" font-size="46">Relaxing Arrow Puzzle</text>
</svg>
